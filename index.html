<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>年号フラッシュラン</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2a2420;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: 'Yu Mincho', 'Hiragino Mincho ProN', 'MS PMincho', 'Meiryo', serif;
    overflow: hidden;
  }
  #gameContainer {
    position: relative; width: 800px; height: 500px;
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 0 30px rgba(139,90,43,0.4), 0 0 60px rgba(80,50,20,0.3);
  }
  canvas { display: block; width: 100%; height: 100%; }

  #titleScreen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    background: linear-gradient(180deg, rgba(240,230,210,0.97), rgba(210,195,170,0.97));
    z-index: 20; animation: fadeIn 0.5s ease;
  }
  #titleScreen.hidden { display: none; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .title-logo {
    font-size: 44px; font-weight: 900; color: #2a1a0a;
    font-family: 'Yu Mincho', 'Hiragino Mincho ProN', serif;
    text-shadow: 2px 2px 0 rgba(139,90,43,0.3);
    letter-spacing: 6px; margin-bottom: 6px;
  }
  .title-sub { color: #8a6a3a; font-size: 14px; margin-bottom: 30px; letter-spacing: 3px; }
  .title-runner { font-size: 56px; animation: float 2s ease-in-out infinite; margin-bottom: 20px; }
  .start-btn {
    padding: 14px 56px; font-size: 20px; font-weight: 700; color: #fff;
    background: linear-gradient(135deg, #8b2020, #5a1010);
    border: 2px solid #c9a96e; border-radius: 50px; cursor: pointer;
    font-family: 'Yu Mincho', 'Hiragino Mincho ProN', serif;
    animation: pulse 2s ease-in-out infinite; transition: box-shadow 0.3s; letter-spacing: 4px;
  }
  .start-btn:hover { box-shadow: 0 0 20px rgba(139,90,43,0.5); }
  .title-info { color: #6a5a40; font-size: 12px; margin-top: 18px; line-height: 1.6; text-align: center; }
  .title-eras { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
  .title-era-badge {
    background: rgba(139,90,43,0.1); border: 1px solid rgba(139,90,43,0.3);
    border-radius: 20px; padding: 3px 10px; font-size: 10px; color: #6a4a2a;
  }
  .zukan-btn {
    margin-top: 12px; padding: 8px 28px; font-size: 14px; font-weight: 700; color: #5a3a1a;
    background: rgba(139,90,43,0.15); border: 1px solid rgba(139,90,43,0.4);
    border-radius: 30px; cursor: pointer; font-family: 'Yu Mincho', serif;
    letter-spacing: 2px; transition: background 0.3s;
  }
  .zukan-btn:hover { background: rgba(139,90,43,0.3); }

  #resultScreen {
    position: absolute; inset: 0; display: none;
    flex-direction: column; justify-content: center; align-items: center;
    background: linear-gradient(180deg, rgba(240,230,210,0.97), rgba(210,195,170,0.97));
    z-index: 20;
  }
  #resultScreen.show { display: flex; }
  .result-title { font-size: 34px; font-weight: 900; color: #3a1a0a; margin-bottom: 20px; font-family: 'Yu Mincho', serif; text-shadow: 1px 1px 0 rgba(139,90,43,0.3); }
  .result-box {
    background: rgba(139,90,43,0.08); border-radius: 16px; padding: 20px 40px;
    margin-bottom: 16px; text-align: center; border: 1px solid rgba(139,90,43,0.2);
  }
  .result-score {
    font-size: 48px; font-weight: 900; color: #8b2020;
  }
  .result-score-label { color: #8a7a5a; font-size: 13px; margin-bottom: 6px; }
  .result-stats { display: flex; gap: 20px; margin-top: 14px; }
  .result-stat { text-align: center; }
  .result-stat-value { font-size: 22px; font-weight: 700; color: #3a2a1a; }
  .result-stat-label { font-size: 10px; color: #8a7a5a; margin-top: 3px; }
  .result-era-label { font-size: 14px; color: #6a4a2a; margin-bottom: 10px; }
  .result-rank { font-size: 18px; color: #2a6a2a; margin-bottom: 14px; font-weight: 700; }
  .restart-btn {
    padding: 12px 44px; font-size: 16px; font-weight: 700; color: #fff;
    background: linear-gradient(135deg, #8b2020, #5a1010);
    border: 2px solid #c9a96e; border-radius: 50px; cursor: pointer;
    font-family: 'Yu Mincho', serif;
    transition: box-shadow 0.3s, transform 0.2s; letter-spacing: 2px;
  }
  .restart-btn:hover { box-shadow: 0 0 20px rgba(139,90,43,0.4); transform: scale(1.05); }
  .result-zukan-btn {
    margin-top: 10px; padding: 10px 32px; font-size: 15px; font-weight: 700; color: #5a3a1a;
    background: rgba(139,90,43,0.15); border: 1px solid rgba(139,90,43,0.4);
    border-radius: 30px; cursor: pointer; font-family: 'Yu Mincho', serif;
    letter-spacing: 2px; transition: background 0.3s;
  }
  .result-zukan-btn:hover { background: rgba(139,90,43,0.3); }

  /* 巻物オーバーレイ */
  #scrollOverlay {
    position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center;
    background: linear-gradient(180deg, rgba(240,230,210,0.98), rgba(220,205,180,0.98));
    z-index: 30; overflow-y: auto;
  }
  #scrollOverlay.show { display: flex; }
  .scroll-header {
    width: 100%; padding: 14px 0; text-align: center;
    background: rgba(139,90,43,0.15); border-bottom: 2px solid rgba(139,90,43,0.3);
    font-size: 24px; font-weight: 900; color: #3a1a0a;
    font-family: 'Yu Mincho', serif; letter-spacing: 4px;
  }
  .scroll-list { width: 100%; padding: 10px 20px; }
  .scroll-card {
    background: linear-gradient(135deg, rgba(245,238,220,0.95), rgba(235,225,200,0.95));
    border: 1px solid rgba(139,90,43,0.3); border-left: 4px solid #8b5a2a;
    border-radius: 8px; padding: 14px 18px; margin-bottom: 10px;
    box-shadow: 1px 2px 6px rgba(80,50,20,0.1);
  }
  .scroll-card-year { font-size: 20px; font-weight: 900; color: #8b2020; font-family: 'Yu Mincho', serif; }
  .scroll-card-event { font-size: 16px; font-weight: 700; color: #3a2a1a; margin-left: 8px; }
  .scroll-card-desc { font-size: 13px; color: #5a4a3a; margin-top: 6px; line-height: 1.6; }
  .scroll-card-gorou { font-size: 13px; color: #8b5a2a; margin-top: 4px; font-weight: 700; }
  .scroll-close-btn {
    margin: 12px 0 16px; padding: 10px 40px; font-size: 16px; font-weight: 700; color: #fff;
    background: linear-gradient(135deg, #8b2020, #5a1010);
    border: 2px solid #c9a96e; border-radius: 50px; cursor: pointer;
    font-family: 'Yu Mincho', serif; letter-spacing: 2px;
  }
  .scroll-close-btn:hover { box-shadow: 0 0 15px rgba(139,90,43,0.4); }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="500"></canvas>
  <div id="titleScreen">
    <div class="title-runner">⛩️🏯</div>
    <div class="title-logo">年号フラッシュラン</div>
    <div class="title-sub">〜 走って覚える日本史年号 〜</div>
    <button class="start-btn" id="startBtn">壱、参る</button>
    <div class="title-info">制限時間60秒 ｜ 敵から逃げろ！<br>各時代2問正解で進化 ｜ 全6時代クリアを目指せ！<br>🐴 正解で乗り物アイテムが出現！</div>
    <div class="title-eras">
      <span class="title-era-badge">飛鳥・奈良</span><span class="title-era-badge">平安</span>

    </div>
    <button class="zukan-btn" id="zukanBtn">📜 年号図鑑</button>
  </div>
  <div id="resultScreen">
    <div class="result-title" id="resultTitle">ゲーム終了！</div>
    <div class="result-box">
      <div class="result-score-label">SCORE</div>
      <div class="result-score" id="finalScore">0</div>
      <div class="result-stats">
        <div class="result-stat"><div class="result-stat-value" id="finalCorrect">0</div><div class="result-stat-label">正解数</div></div>
        <div class="result-stat"><div class="result-stat-value" id="finalAccuracy">0%</div><div class="result-stat-label">正答率</div></div>
        <div class="result-stat"><div class="result-stat-value" id="finalTime">0s</div><div class="result-stat-label">プレイ時間</div></div>
        <div class="result-stat"><div class="result-stat-value" id="finalDist">50</div><div class="result-stat-label">最終距離</div></div>
      </div>
    </div>
    <div class="result-era-label" id="finalEra"></div>
    <div class="result-rank" id="resultRank"></div>
    <button class="restart-btn" id="restartBtn">もう一回プレイ</button>
    <button class="result-zukan-btn" id="resultZukanBtn">📜 年号図鑑を見る</button>
  </div>
  <div id="scrollOverlay">
    <div class="scroll-header">📜 年号巻物図鑑</div>
    <div class="scroll-list" id="scrollList"></div>
    <button class="scroll-close-btn" id="scrollCloseBtn">閉じる</button>
  </div>
</div>

function spawnP(x,y,c,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-0.5)*8,vy:(Math.random()-1)*6,life:1,decay:0.02+Math.random()*0.03,size:3+Math.random()*4,color:c});}
function updateP(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=p.decay;if(p.life<=0)particles.splice(i,1);}}
function drawP(){particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}
function showF(t,x,y,c,s){floatingTexts.push({text:t,x,y,color:c,life:1,vy:-2,size:s||22});}
function updateF(){for(let i=floatingTexts.length-1;i>=0;i--){const f=floatingTexts[i];f.y+=f.vy;f.life-=0.025;if(f.life<=0)floatingTexts.splice(i,1);}}
function drawF(){floatingTexts.forEach(f=>{ctx.globalAlpha=f.life;ctx.fillStyle=f.color;ctx.font=`bold ${f.size}px sans-serif`;ctx.textAlign='center';ctx.fillText(f.text,f.x,f.y);});ctx.globalAlpha=1;}

function findScrollData(year){return SCROLL_DATA.find(s=>s.year===year);}
function showScrollOverlay(filterYears){
  const list=document.getElementById('scrollList');
  list.innerHTML='';
  const items=filterYears?SCROLL_DATA.filter(s=>filterYears.includes(s.year)):SCROLL_DATA;
  items.forEach((s,i)=>{
    const card=document.createElement('div');card.className='scroll-card';
    card.style.opacity='0';card.style.transform='translateX(-20px)';
    setTimeout(()=>{card.style.transition='opacity 0.4s, transform 0.4s';card.style.opacity='1';card.style.transform='translateX(0)';},i*80);
    card.innerHTML=`<span class="scroll-card-year">${s.year}年</span><span class="scroll-card-event">「${s.event}」</span><div class="scroll-card-desc">${s.desc}</div><div class="scroll-card-gorou">💡 ${s.gorou}</div>`;
    list.appendChild(card);
  });
  document.getElementById('scrollOverlay').classList.add('show');
}
function hideScrollOverlay(){
  document.getElementById('scrollOverlay').classList.remove('show');
  document.getElementById('scrollOverlay').scrollTop=0;
}
// 個別巻物表示（ゲーム中の不正解時）
function showSingleScroll(year){
  const s=findScrollData(year);if(!s)return;
  const list=document.getElementById('scrollList');
  list.innerHTML='';
  const card=document.createElement('div');card.className='scroll-card';
  card.style.opacity='0';card.style.transform='scale(0.8)';
  setTimeout(()=>{card.style.transition='opacity 0.5s, transform 0.5s';card.style.opacity='1';card.style.transform='scale(1)';},100);
  card.innerHTML=`<span class="scroll-card-year">${s.year}年</span><span class="scroll-card-event">「${s.event}」</span><div class="scroll-card-desc">${s.desc}</div><div class="scroll-card-gorou">💡 ${s.gorou}</div>`;
  list.appendChild(card);
  scrollViewYear=year;
  document.getElementById('scrollOverlay').classList.add('show');
}
document.getElementById('scrollCloseBtn').addEventListener('click',()=>{
  hideScrollOverlay();
  if(scrollViewYear&&gameState==='playing'){scrollViewYear=null;gorouDisplay.active=false;}
  scrollViewYear=null;
});
document.getElementById('zukanBtn').addEventListener('click',()=>showScrollOverlay(null));
document.getElementById('resultZukanBtn').addEventListener('click',()=>{
  const yrs=[...new Set(sessionAnswered)];
  showScrollOverlay(yrs.length>0?yrs:null);
});

function spawnItem(){
  itemFloating=true;
  itemX=820; // 画面右端外から
  itemY=GROUND_Y-60+Math.random()*30;
  itemGlow=0;
}
function updateItem(dt){
  if(!itemFloating)return;
  itemX-=speed*dt*50+2; // 前方から流れてくる
  itemGlow+=dt*5;
  // プレイヤーとの当たり判定
  const px=PLAYER_X+playerDashOff;
  const dist=Math.sqrt((itemX-px)**2+(itemY-(GROUND_Y-3))**2);
  if(dist<35){
    // 取得！
    itemFloating=false;
    activateVehicle();
  }
  // 画面外に出たら消える
  if(itemX<-50)itemFloating=false;
}
function drawItem(){
  if(!itemFloating)return;
  const gv=Math.sin(itemGlow)*0.4+0.6;
  // グロー
  ctx.save();
  ctx.globalAlpha=0.3*gv;
  ctx.fillStyle='#ffdd33';
  ctx.beginPath();ctx.arc(itemX,itemY,20+Math.sin(itemGlow*2)*5,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=0.15*gv;
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(itemX,itemY,28+Math.sin(itemGlow*2)*8,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // アイテム本体（キラキラ星型）
  ctx.fillStyle='#ffdd33';
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=(-Math.PI/2)+i*Math.PI*2/5;
    const a2=a+Math.PI/5;
    ctx.lineTo(itemX+Math.cos(a)*12,itemY+Math.sin(a)*12);
    ctx.lineTo(itemX+Math.cos(a2)*5,itemY+Math.sin(a2)*5);
  }
  ctx.closePath();ctx.fill();
  // 乗り物アイコン（テキスト）
  ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
  ctx.fillText(ERA_VEHICLES[currentEra].name,itemX,itemY+4);
  // キラキラパーティクル
  if(Math.random()<0.15)spawnP(itemX+(Math.random()-0.5)*20,itemY+(Math.random()-0.5)*20,'rgba(255,221,51,0.6)',1);
  ctx.restore();
}

function activateVehicle(){
  vehicleActive=true;
  vehicleTimer=VEHICLE_DURATION;
  vehicleEra=currentEra;
  targetSpeed=BOOST_SPEED*VEHICLE_SPEED_MULT;
  spawnP(PLAYER_X,GROUND_Y-30,'#33ffcc',25);
  spawnP(PLAYER_X,GROUND_Y-30,'#ffdd33',15);
  showF(`🐴 ${ERA_VEHICLES[currentEra].name}ゲット！`,400,GROUND_Y-80,'#33ffcc',24);
  showF('速度UP & 無敵！',400,GROUND_Y-55,'#ffdd33',16);
  score+=50;
  flashColor='#33ffcc';flashAlpha=0.25;
}
function deactivateVehicle(){
  vehicleActive=false;
  vehicleTimer=0;
  targetSpeed=BASE_SPEED;
  vehicleEndEffect=1.5; // 演出タイマー
  spawnP(PLAYER_X,GROUND_Y-20,'rgba(100,100,100,0.5)',12);
  showF('速度ダウン！',PLAYER_X,GROUND_Y-60,'#ff8833',22);
  flashColor='#888';flashAlpha=0.15;
}

// ============================================================
// シーン描画
// ============================================================
function drawScene(){
  BG_DRAW[currentEra]();
  const ls=Math.sin(bouncePhase*2)*14,as=Math.sin(bouncePhase*2)*18;
  const eLs=Math.sin(enemyPhase*2)*14,eAs=Math.sin(enemyPhase*2)*18;
  const pb=Math.abs(Math.sin(bouncePhase))*8,eb=Math.abs(Math.sin(enemyPhase))*8;
  const px=PLAYER_X+playerDashOff,ex=px-(displayDist/100)*ENEMY_GAP-enemyDashOff;
  ctx.save();ctx.translate(ex,GROUND_Y-3-eb);ENEMY_DRAW[currentEra](eLs,eAs);ctx.restore();

  // アイテム描画
  drawItem();

  // プレイヤー描画（乗り物あり/なし）
  if(vehicleActive){
    // 乗り物＋キャラ
    const vBounce=bouncePhase;
    const vehicleBob=Math.abs(Math.sin(vBounce))*4;
    ctx.save();ctx.translate(px,GROUND_Y-3-vehicleBob);
    // 乗り物を先に描画
    VEHICLE_DRAW[vehicleEra](vBounce);
    // キャラを乗り物の上に縮小して描画
    ctx.save();
    ctx.translate(0,-22);ctx.scale(0.7,0.7);
    PLAYER_DRAW[currentEra](ls*0.5,as*0.5);
    ctx.restore();
    // 乗り物オーラ
    ctx.globalAlpha=0.12+Math.sin(Date.now()*0.008)*0.06;
    ctx.strokeStyle='#33ffcc';ctx.lineWidth=3;
    ctx.beginPath();ctx.ellipse(0,-10,35,25,0,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
    // スピード線
    ctx.globalAlpha=0.45;
    for(let i=1;i<=5;i++){
      ctx.strokeStyle=i%2===0?'#33ffcc':'#ffdd33';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(-25-i*12,-15+i*6);ctx.lineTo(-38-i*12,-15+i*6);ctx.stroke();
    }
    ctx.globalAlpha=1;
    ctx.restore();
  } else {
    ctx.save();ctx.translate(px,GROUND_Y-3-pb);PLAYER_DRAW[currentEra](ls,as);
    if(speed>BASE_SPEED+1){ctx.globalAlpha=0.35;for(let i=1;i<=3;i++){ctx.strokeStyle='#ffdd33';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-20-i*9,-12+i*4);ctx.lineTo(-28-i*9,-12+i*4);ctx.stroke();}ctx.globalAlpha=1;}
    ctx.restore();
  }

  // 速度ダウン演出
  if(vehicleEndEffect>0){
    const ea=Math.min(1,vehicleEndEffect);
    ctx.globalAlpha=ea*0.3;
    ctx.fillStyle='#888';
    // 減速モヤ
    for(let i=0;i<4;i++){
      ctx.beginPath();ctx.arc(px-20-i*15,GROUND_Y-10+Math.sin(Date.now()*0.003+i)*5,8+i*3,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  if(Math.random()<speed*0.03)spawnP(px-10,GROUND_Y+12,'rgba(160,130,100,0.3)',1);
  if(Math.random()<0.02)spawnP(ex+10,GROUND_Y+12,'rgba(180,60,60,0.3)',1);
  if(displayDist<=20&&!vehicleActive){ctx.fillStyle=`rgba(255,0,0,${0.06+Math.sin(Date.now()*0.008)*0.04})`;ctx.fillRect(0,SCENE_TOP,800,500-SCENE_TOP);}
}

// ============================================================
// 問題出題 / 回答
// ============================================================
function showNextQ(){
  const pool=ERA_QUESTIONS[currentEra];if(eraUsedQs.length>=pool.length)eraUsedQs=[];
  const avail=pool.filter((_,i)=>!eraUsedQs.includes(i));const qi=pool.indexOf(avail[Math.floor(Math.random()*avail.length)]);eraUsedQs.push(qi);
  const q=pool[qi];currentQuestion={year:q.year,event:q.event,choices:[...q.choices].sort(()=>Math.random()-0.5),gorou:q.gorou||'',desc:q.desc||''};
  sessionAnswered.push(q.year);
}
function answerQ(ci){
  if(!currentQuestion)return;const sel=currentQuestion.choices[ci],ok=sel===currentQuestion.year;totalAnswered++;
  if(ok){
    correctCount++;combo++;if(combo>maxCombo)maxCombo=combo;const bonus=100*combo;score+=bonus;
    if(!vehicleActive)targetSpeed=BOOST_SPEED;
    flashColor='#33ff99';flashAlpha=0.2;playerDashOff=30;
    // 乗り物中は距離が減らない（無敵）だが、増加はする
    chaseDist=Math.min(100,chaseDist+20);
    spawnP(PLAYER_X,GROUND_Y-30,'#ffdd33',15);spawnP(PLAYER_X,GROUND_Y-30,'#33ff99',8);
    showF(`+${bonus}`,PLAYER_X+40,GROUND_Y-50,'#ffdd33');
    if(combo>1)showF(`${combo} COMBO!`,400,SCENE_TOP+30,'#ff9933',18);
    if(chaseDist>=100&&!wasAtMax){wasAtMax=true;score+=300;showF('完全逃げ切り！+300',400,GROUND_Y-70,'#33ffcc',26);spawnP(400,GROUND_Y-40,'#33ffcc',20);}
    eraCorrectCount++;
    // 乗り物アイテムスポーン（30%確率、乗り物非アクティブ時のみ）
    if(!vehicleActive&&!itemFloating&&Math.random()<VEHICLE_SPAWN_CHANCE){
      spawnItem();
    }
    if(eraCorrectCount>=CORRECT_PER_ERA){
      if(currentEra>=5){currentQuestion=null;setTimeout(()=>endGame('clear'),800);return;}
      currentEra++;eraCorrectCount=0;eraUsedQs=[];eraTransAlpha=1.0;eraLabelTimer=2.5;nextQInterval=Q_INTERVAL_ERA;
      // 時代進化時に乗り物リセット
      if(vehicleActive){deactivateVehicle();}
      itemFloating=false;
      spawnP(400,300,'#ffdd33',30);spawnP(400,300,'#ff9933',20);spawnP(400,300,'#fff',15);showF('⚡ 進化！',400,GROUND_Y-80,'#ffdd33',28);
    }
  } else {
    combo=0;
    if(!vehicleActive){
      targetSpeed=SLOW_SPEED;
      chaseDist=Math.max(0,chaseDist-20);
      enemyDashOff=30;
      if(chaseDist<=0){currentQuestion=null;setTimeout(()=>endGame('caught'),600);return;}
    } else {
      showF('🛡️ 無敵！',PLAYER_X,GROUND_Y-70,'#33ffcc',18);
    }
    flashColor='#ff3333';flashAlpha=0.2;shakeAmount=vehicleActive?2:8;
    spawnP(PLAYER_X-30,GROUND_Y,'#ff3333',12);showF(`${currentQuestion.year}年`,PLAYER_X,GROUND_Y-50,'#ff5555');
    // 語呂合わせ表示（巻物ボタン付き）
    const hasScroll=!!findScrollData(currentQuestion.year);
    gorouDisplay={active:true, year:currentQuestion.year, event:currentQuestion.event, gorou:currentQuestion.gorou||'', desc:currentQuestion.desc||'', timer:6.0, showScrollBtn:hasScroll, _btnRect:null};
  }
  if(chaseDist<100)wasAtMax=false;currentQuestion=null;questionTimer=0;
  if(!vehicleActive)setTimeout(()=>{targetSpeed=BASE_SPEED;},1200);
}

// ============================================================
// 入力
// ============================================================
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=(e.clientX-r.left)*(canvas.width/r.width);mouseY=(e.clientY-r.top)*(canvas.height/r.height);});
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();const cx=(e.clientX-r.left)*(canvas.width/r.width),cy=(e.clientY-r.top)*(canvas.height/r.height);
  // 語呂合わせパネルの「📜 詳しく見る」ボタン
  if(gorouDisplay.active&&gorouDisplay.showScrollBtn&&gorouDisplay._btnRect){
    const b=gorouDisplay._btnRect;
    if(cx>=b.x&&cx<=b.x+b.w&&cy>=b.y&&cy<=b.y+b.h){showSingleScroll(gorouDisplay.year);return;}
  }
  if(gameState!=='playing'||!currentQuestion)return;
  for(let i=0;i<4;i++){const b=btnRect(i);if(cx>=b.x&&cx<=b.x+b.w&&cy>=b.y&&cy<=b.y+b.h){answerQ(i);return;}}
});
document.addEventListener('keydown',e=>{if(gameState!=='playing'||!currentQuestion)return;const n=parseInt(e.key);if(n>=1&&n<=4)answerQ(n-1);});

// ============================================================
// ゲーム開始・終了
// ============================================================
function resetGame(){
  score=0;combo=0;maxCombo=0;correctCount=0;totalAnswered=0;timeLeft=GAME_DURATION;speed=BASE_SPEED;targetSpeed=BASE_SPEED;runDist=0;
  currentQuestion=null;questionTimer=0;eraUsedQs=[];particles=[];floatingTexts=[];shakeAmount=0;flashColor=null;flashAlpha=0;
  currentEra=0;eraCorrectCount=0;eraTransAlpha=0;eraLabelTimer=0;chaseDist=50;displayDist=50;playerDashOff=0;enemyDashOff=0;wasAtMax=false;
  bouncePhase=0;enemyPhase=0;bgOffset=0;groundOffset=0;nextQInterval=Q_INTERVAL;endReason='';
  // 乗り物リセット
  vehicleActive=false;vehicleTimer=0;vehicleEra=0;itemFloating=false;itemX=0;itemY=0;itemGlow=0;vehicleEndEffect=0;
  gorouDisplay={active:false,year:0,event:'',gorou:'',desc:'',timer:0,showScrollBtn:false,_btnRect:null};
  sessionAnswered=[];scrollViewYear=null;
}
function startGame(){
  resetGame();gameState='playing';startTime=Date.now();
  document.getElementById('titleScreen').classList.add('hidden');document.getElementById('resultScreen').classList.remove('show');showNextQ();
}
function endGame(reason){
  if(gameState!=='playing')return;gameState='result';endReason=reason||'timeout';playTime=(Date.now()-startTime)/1000;
  const acc=totalAnswered>0?Math.round((correctCount/totalAnswered)*100):0;
  console.log('=== 年号フラッシュラン リザルト ===');
  console.log(`結果: ${endReason==='clear'?'クリア！':endReason==='caught'?'追いつかれた':'タイムアップ'}`);
  console.log(`スコア: ${score}`);console.log(`正解数: ${correctCount} / ${totalAnswered}`);console.log(`正答率: ${acc}%`);console.log(`最大コンボ: ${maxCombo}`);
  console.log(`到達時代: ${ERAS[currentEra].name}（${ERAS[currentEra].label}）`);console.log(`最終距離: ${Math.round(chaseDist)}`);console.log(`プレイ時間: ${playTime.toFixed(1)}秒`);
  console.log('================================');
  if(endReason==='clear')score+=1000;
  let title,rank;
  if(endReason==='clear'){title='🎌 全時代クリア！！';rank='🏆 歴史の覇者！全時代を駆け抜けた！';}
  else if(endReason==='caught'){title=`💀 ${ERAS[currentEra].enemy}に追いつかれた！`;rank=currentEra>=4?'🥈 あと少しだった！惜しい！':currentEra>=2?'🥉 中盤まで頑張った！':'📚 もっと年号を覚えよう！';}
  else{title='⏰ タイムアップ！';rank=score>=3000?'🥇 時間切れだが素晴らしい！':score>=1000?'🥈 なかなかの歴史通！':'📚 もっと素早く答えよう！';}
  document.getElementById('resultTitle').textContent=title;document.getElementById('finalScore').textContent=score.toLocaleString();
  document.getElementById('finalCorrect').textContent=`${correctCount}/${totalAnswered}`;document.getElementById('finalAccuracy').textContent=`${acc}%`;
  document.getElementById('finalTime').textContent=`${playTime.toFixed(1)}s`;document.getElementById('finalDist').textContent=Math.round(chaseDist).toString();
  document.getElementById('finalEra').textContent=`到達時代：${ERAS[currentEra].name}【${ERAS[currentEra].label}】`;
  document.getElementById('resultRank').textContent=rank;document.getElementById('resultScreen').classList.add('show');
  DarwinBridge.stageClear({score: score, correct: correctCount, total: totalAnswered});
}
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('restartBtn').addEventListener('click',startGame);

// ============================================================
// メインループ
// ============================================================
let lastTime=0;
function gameLoop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;
  if(gameState==='playing'){
    timeLeft-=dt;if(timeLeft<=0){timeLeft=0;endGame('timeout');}
    // 乗り物アクティブ時はスピード倍率を維持
    if(vehicleActive){
      speed+=(BOOST_SPEED*VEHICLE_SPEED_MULT-speed)*0.08;
    } else {
      speed+=(targetSpeed-speed)*0.06;
    }
    runDist+=speed*dt*10;bgOffset+=speed*dt*30;groundOffset+=speed*dt*30;
    bouncePhase+=speed*0.15;enemyPhase+=2.2*0.15;
    displayDist+=(chaseDist-displayDist)*0.08;playerDashOff*=0.88;enemyDashOff*=0.88;
    if(playerDashOff<0.5)playerDashOff=0;if(enemyDashOff<0.5)enemyDashOff=0;
    // 語呂合わせ表示中は問題タイマーを停止
    if(gorouDisplay.active){gorouDisplay.timer-=dt;if(gorouDisplay.timer<=0){gorouDisplay.active=false;}}
    if(!currentQuestion&&!gorouDisplay.active&&gameState==='playing'){questionTimer+=dt*1000;if(questionTimer>=nextQInterval){questionTimer=0;nextQInterval=Q_INTERVAL;showNextQ();}}
    if(shakeAmount>0)shakeAmount*=0.9;if(shakeAmount<0.1)shakeAmount=0;
    if(flashAlpha>0)flashAlpha*=0.93;if(eraTransAlpha>0)eraTransAlpha*=0.92;if(eraLabelTimer>0)eraLabelTimer-=dt;
    // 乗り物タイマー更新
    if(vehicleActive){
      vehicleTimer-=dt;
      if(vehicleTimer<=0){deactivateVehicle();}
    }
    // 速度ダウン演出タイマー
    if(vehicleEndEffect>0)vehicleEndEffect-=dt;
    // アイテム更新
    updateItem(dt);
    updateP();updateF();updateSakura(dt);
  }
  ctx.save();if(shakeAmount>0)ctx.translate((Math.random()-0.5)*shakeAmount,(Math.random()-0.5)*shakeAmount);
  ctx.fillStyle='#111';ctx.fillRect(0,0,800,500);
  if(gameState==='playing'){
    drawScene();drawSakura();drawP();drawF();drawQuestionPanel();drawGorouPanel();drawHUD();drawDistGauge();
    if(flashAlpha>0.01){ctx.fillStyle=flashColor;ctx.globalAlpha=flashAlpha;ctx.fillRect(0,0,800,500);ctx.globalAlpha=1;}
    if(eraTransAlpha>0.01){ctx.fillStyle='#ffdd33';ctx.globalAlpha=eraTransAlpha*0.5;ctx.fillRect(0,0,800,500);ctx.globalAlpha=1;}
  }
  ctx.restore();requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>

<script>DarwinBridge.ready();</script>
